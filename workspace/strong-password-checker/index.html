<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong Password Checker</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --accent: #4a90d9;
    --danger: #e74c3c;
    --warning: #f39c12;
    --success: #2ecc71;
    --text: #333;
    --muted: #888;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    padding: 30px 36px;
    width: 100%;
    max-width: 440px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 8px;
    color: var(--accent);
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 24px;
    font-size: .9rem;
  }
  .input-wrapper {
    position: relative;
    margin-bottom: 12px;
  }
  .input-wrapper input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: var(--radius);
    font-size: 1rem;
    transition: border-color .3s;
    outline: none;
  }
  .input-wrapper input:focus {
    border-color: var(--accent);
  }
  .toggle-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: .9rem;
    color: var(--muted);
  }
  .strength-bar {
    height: 6px;
    background: #eee;
    border-radius: 3px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .strength-bar .fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width .3s, background .3s;
  }
  .strength-text {
    text-align: center;
    font-weight: 600;
    margin-bottom: 16px;
    font-size: .95rem;
  }
  .criteria {
    list-style: none;
    padding: 0;
  }
  .criteria li {
    padding: 6px 0;
    font-size: .9rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .criteria li .icon {
    font-size: 1rem;
    width: 20px;
    text-align: center;
  }
  .criteria li.valid {
    color: var(--success);
  }
  .criteria li.valid .icon { color: var(--success); }
  .criteria li.invalid .icon { color: var(--danger); }
</style>
</head>
<body>
<div class="container">
  <h1>🔐 Strong Password Checker</h1>
  <p class="subtitle">Enter a password to see how strong it is.</p>

  <div class="input-wrapper">
    <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
    <button class="toggle-btn" id="toggleBtn" aria-label="Show password">👁️</button>
  </div>

  <div class="strength-bar"><div class="fill" id="bar"></div></div>
  <div class="strength-text" id="strengthText"></div>

  <ul class="criteria" id="criteria">
    <li data-test="length"><span class="icon">✖</span> At least 8 characters</li>
    <li data-test="uppercase"><span class="icon">✖</span> Contains uppercase letter</li>
    <li data-test="lowercase"><span class="icon">✖</span> Contains lowercase letter</li>
    <li data-test="digit"><span class="icon">✖</span> Contains a digit</li>
    <li data-test="special"><span class="icon">✖</span> Contains a special character (!@#$%^&*…)</li>
  </ul>
</div>

<script>
(function () {
  const input = document.getElementById('password');
  const bar = document.getElementById('bar');
  const text = document.getElementById('strengthText');
  const toggleBtn = document.getElementById('toggleBtn');
  const criteria = document.getElementById('criteria');

  const tests = {
    length:      { re: /.{8,}/,        label: 'At least 8 characters' },
    uppercase:   { re: /[A-Z]/,        label: 'Contains uppercase letter' },
    lowercase:   { re: /[a-z]/,        label: 'Contains lowercase letter' },
    digit:       { re: /\d/,           label: 'Contains a digit' },
    special:     { re: /[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?~`]/, label: 'Contains a special character' }
  };

  function update() {
    const pw = input.value;
    let passed = 0;
    const total = Object.keys(tests).length;

    // Update criteria list
    const items = criteria.querySelectorAll('li');
    items.forEach(li => {
      const key = li.dataset.test;
      const ok = tests[key].re.test(pw);
      li.classList.toggle('valid', ok);
      li.classList.toggle('invalid', !ok);
      li.querySelector('.icon').textContent = ok ? '✔' : '✖';
      if (ok) passed++;
    });

    const ratio = passed / total;
    let color, label;
    if (ratio === 1) {
      color = 'var(--success)';
      label = 'Strong';
    } else if (ratio >= 0.6) {
      color = 'var(--warning)';
      label = 'Medium';
    } else {
      color = 'var(--danger)';
      label = 'Weak';
    }

    bar.style.width = (ratio * 100) + '%';
    bar.style.background = color;
    text.textContent = label;
    text.style.color = color;
  }

  input.addEventListener('input', update);

  toggleBtn.addEventListener('click', () => {
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    toggleBtn.textContent = isPassword ? '🙈' : '👁️';
  });
})();
</script>
</body>
</html>
